name = "arxiv-ingest"
main = "src/ingest-worker/index.ts"
compatibility_date = "2025-01-01"
workers_dev = true

[triggers]
crons = ["0 * * * *", "30 2 * * *"]  # every hour (ingest) + 02:30 daily (CrossRef)

[[d1_databases]]
binding = "DB"
database_name = "arxiv-explorer"
database_id = "67fa825b-9f3e-478c-99d2-3e5cc1b0f3de"

[[vectorize]]
binding = "VECTORIZE"
index_name = "arxiv-papers"

[[kv_namespaces]]
binding = "CACHE"
id = "ed3c323de9cc48a4b332beec939597a4"

[ai]
binding = "AI"

[vars]
# ── Neuron budget: 10,000 / day (free tier) ──────────────────────────────────
# Cost: ~44 neurons / paper  (1 embedding + ~43 summary tokens)
# Target: ≤ 200 new papers / day  →  ~8,800 neurons  (safe margin)
#
# 2 categories × 10 papers / cron × 24 runs = 480 fetch attempts/day
# After D1 dedup ~50–80 truly new papers reach AI  →  ~3,500 neurons/day
# ─────────────────────────────────────────────────────────────────────────────
ARXIV_FETCH_CATEGORIES = "cs.AI,cs.LG"
SUMMARY_MODEL = "@cf/meta/llama-3.1-8b-instruct"
EMBEDDING_MODEL = "@cf/baai/bge-base-en-v1.5"
ARXIV_FETCH_LIMIT_PER_CATEGORY = "10"
INGEST_MAX_CONCURRENT = "3"
ARXIV_RATE_LIMIT_DELAY_MS = "3000"

# ── Ollama (optional) ─────────────────────────────────────────────────────────
# When OLLAMA_BASE is set the ingest-worker calls Ollama FIRST and only falls
# back to Workers AI if Ollama fails. Set this to your machine's LAN IP so the
# Cloudflare Worker can reach it (Cloudflare → your router → Ollama).
#
# Requires a tunnel or port-forward from a public IP to localhost:11434.
# Fastest option: cloudflared tunnel (free):
#   cloudflared tunnel --url http://localhost:11434
# Then set OLLAMA_BASE to the generated https://*.trycloudflare.com URL.
#
# OLLAMA_BASE = "https://your-tunnel.trycloudflare.com"
# OLLAMA_SUMMARY_MODEL = "gemma4:e4b"       # default: gemma4:e4b
# OLLAMA_EMBEDDING_MODEL = "nomic-embed-text" # default: nomic-embed-text
