name = "arxiv-ingest"
main = "src/ingest-worker/index.ts"
compatibility_date = "2025-01-01"
workers_dev = true

[triggers]
crons = ["0 * * * *"]  # every hour at :00 UTC

[[d1_databases]]
binding = "DB"
database_name = "arxiv-explorer"
database_id = "67fa825b-9f3e-478c-99d2-3e5cc1b0f3de"

[[vectorize]]
binding = "VECTORIZE"
index_name = "arxiv-papers"

[[kv_namespaces]]
binding = "CACHE"
id = "ed3c323de9cc48a4b332beec939597a4"

[ai]
binding = "AI"

[vars]
# ALL arXiv categories needed to feed every topic in the DB.
# 24 categories × 10 papers × 24 runs = 5,760 fetch attempts/day
# After dedup typically ~60-120 truly new papers reach AI (~5,280 neurons/day)
# Daily cap: 227 papers (10,000 neurons ÷ 44 neurons/paper) — enforced by pipeline quota
#
# Derived from migrations/0014_topic_categories_normalized.sql topic_categories table.
# Every code listed there must appear here, or papers for that topic never arrive.
#
# cs.AI  → Alignment, Agents, Efficient ML, Architectures, Vision, Robotics
# cs.AR  → Computer Architecture
# cs.CC  → Complexity
# cs.CL  → LLMs, Alignment, Multimodal, RAG, Speech & Audio
# cs.CR  → Cryptography, Adversarial ML, Privacy
# cs.CV  → Multimodal, Diffusion, Efficient ML, Vision, Adversarial ML
# cs.DC  → Distributed Systems, Operating Systems
# cs.DM  → Algorithms
# cs.DS  → Algorithms
# cs.HC  → HCI
# cs.IR  → RAG
# cs.IT  → Info Theory
# cs.LG  → LLMs, RL, Agents, Diffusion, Efficient ML, Alignment, Architectures, Adversarial ML, Privacy, Program Synthesis
# cs.MA  → Agents
# cs.NE  → Architectures
# cs.NI  → Networking
# cs.OS  → Operating Systems
# cs.PL  → Program Synthesis
# cs.RO  → Robotics
# cs.SD  → Speech & Audio
# cs.SE  → Program Synthesis, Software Testing
# eess.AS → Speech & Audio
# eess.SP → Info Theory
# stat.ML → Efficient ML
ARXIV_FETCH_CATEGORIES = "cs.AI,cs.AR,cs.CC,cs.CL,cs.CR,cs.CV,cs.DC,cs.DM,cs.DS,cs.HC,cs.IR,cs.IT,cs.LG,cs.MA,cs.NE,cs.NI,cs.OS,cs.PL,cs.RO,cs.SD,cs.SE,eess.AS,eess.SP,stat.ML"

SUMMARY_MODEL    = "@cf/meta/llama-3.1-8b-instruct"
EMBEDDING_MODEL  = "@cf/baai/bge-base-en-v1.5"
INGEST_MAX_CONCURRENT = "2"
POLITE_EMAIL     = "teycircoder12@gmail.com"
